name: FitHub CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Construir imagem Docker do Backend
      run: |
        cd backend
        docker build -t fithub-backend:${{ github.sha }} .

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Construir imagem Docker do Frontend
      run: |
        cd frontend
        docker build -t fithub-frontend:${{ github.sha }} .